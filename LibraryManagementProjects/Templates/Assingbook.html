{% extends 'navbar.html' %}
 {% block content %}
{% load static %}
<link href="{% static 'css/Assingbook.css'%}" rel="stylesheet">
    <h3 align="center" class="login"> welcome too  Assing book page</h3>
        <div class="sss">
            <div class="div1">
                <form action="assingdata" method="post">
                    {% csrf_token %}
                    <h3>ASSING BOOK </h3>
                    <table>
                        <tr>
                            <td>STUDENT SEM:</td><td><input type="number" name="txtsam"></td>
                        </tr>
                        <tr>
                            <td>STUDENT COURSE:</td>
                            <td>
                                <select name="ddlcourse" class="input-fielid">
                                    {% for i in course_data %}
                                        <option>{{ i.course_name }}</option>
                                    {% endfor %}

                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td></td><td> <input type="submit" name="btmsum"></td>
                        </tr>
                    </table>
                </form>
            </div>
                <div class="div2">
                    <form action="assreaddata" method="post">
                        {% csrf_token %}
                        <table>
                            <tr>
                                <td>STUDENT NAME:</td>
                                <td>
                                    <select name="textname">
                                        {% for i in stud_data %}
                                            <option>{{ i.s_name }}</option>
                                        {% endfor %}

                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td> BOOK NAME:</td>
                                <td>
                                    <select name="txtbook">
                                        {% for i in book_data %}
                                            <option>{{ i.book_name }}</option>
                                        {% endfor %}

                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td>START DATE</td><td> <input type="date" name="txtsdate"></td>
                            </tr>
                            <tr>
                                <td>END DATE</td><td> <input type="date" name="txtedate"></td>
                            </tr>
                            <tr>
                                <td></td><td><input type="submit" value="ASSING" name="subassing"></td>
                            </tr>
                        </table>
                    </form>
                </div>

            </div>
{% endblock %}
