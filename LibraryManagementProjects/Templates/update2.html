{% extends 'navbar.html' %}
 {% block content %}
{% load static %}
<link href="{% static 'css/Assingbook.css'%}" rel="stylesheet">
    <h3 align="center" class="login"> ISSUE UPDATE</h3>
    <div class="div2">
        <form method="post">
            {% csrf_token %}
            <table>
                <tr>
                    <td>STUDENT NAME:</td>
                    <td>
                        <input type="text" name="textname" value="{{ issdata.stu_name }}">

                    </td>
                </tr>
                <tr>
                    <td> BOOK NAME:</td>
                    <td>
                        <select name="txtbook">
                            <option selected>{{ issdata.bo_name}}</option>
                            {% for i in bdata %}
                                <option>{{ i.book_name }}</option>
                            {% endfor %}

                        </select>
                    </td>
                </tr>
                <tr>
                    <td>START DATE</td><td> <input type="date" name="txtsdate" >
                <input type="text" value="{{issdata.start_date}}" disabled></td>
                </tr>
                <tr>
                    <td>END DATE</td><td> <input type="date" name="txtedate">
                <input type="text" value="{{issdata.end_date}}" disabled></td>
                </tr>
                <tr>
                    <td></td><td><input type="submit" value="ASSING" name="subassing"></td>
                </tr>
            </table>
        </form>
    </div>
{% endblock %}
